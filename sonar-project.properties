sonar.projectKey=danstis_ai-usage-dashboard
sonar.organization=danstis

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=ai-usage-dashboard
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Encoding of the source code. Default is default system encoding
#sonar.sourceEncoding=UTF-8

# Go coverage report produced by the test step
sonar.go.coverage.reportPaths=coverage.out

# Exclude Go test files from coverage analysis: SonarCloud would otherwise
# count the test functions themselves as uncovered new code (they're not
# production code), dragging down "Coverage on New Code" by lines that
# cannot meaningfully be covered. The tests still run and produce the
# coverage report that measures the production code.
sonar.coverage.exclusions=**/*_test.go

# Test-vs-production classification. SonarCloud runs two scans: the
# `sonar.sources` scan produces the production quality gate (the one the
# build blocks on), and the `sonar.tests` scan produces the test-side
# metrics (the same kind of metrics that used to fold into production
# and trip the gate on test smells like cognitive complexity).
#
# `sonar.exclusions` removes *_test.go from the production scan.
# `sonar.test.inclusions` lists *_test.go in the test scan.
# No `sonar.test.exclusions` here — once inclusions narrows the test
# pool to *_test.go, there's nothing further to exclude, and setting
# it to the same pattern would cancel itself out (the previous commit
# tried that approach and was reverted per PR Review Sentinel).
sonar.sources=.
sonar.exclusions=**/*_test.go
sonar.tests=.
sonar.test.inclusions=**/*_test.go
